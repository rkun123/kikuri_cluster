name: Renovate

on:
  # 定期実行（例：1時間に1回）
  schedule:
    - cron: '0 * * * *'
  # 手動での即時実行も可能にする
  workflow_dispatch:

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.20
        with:
          configurationFile: renovate.json
          token: ${{ secrets.RENOVATE_TOKEN }}
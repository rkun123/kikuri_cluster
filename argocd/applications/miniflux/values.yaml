nameOverride: ""
fullnameOverride: ""

namespace: miniflux
destination:
  server: https://kubernetes.default.svc

labels:
  app: miniflux

source:
  image: miniflux/miniflux
  tag: 2.3.2-distroless

env:
  TZ: Asia/Tokyo

db:
  user: miniflux
  database: miniflux
  password: miniflux
  port: 5432

  labels:
    app: miniflux-db

pvc_db:
  storageClass:
    name: fast
  accessModes:
    - ReadWriteOnce
  storage: 5Gi

pvc_data:
  storageClass:
    name: fast
  accessModes:
    - ReadWriteOnce
  storage: 1Gi

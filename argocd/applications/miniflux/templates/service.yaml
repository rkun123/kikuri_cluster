apiVersion: v1
kind: Service
metadata:
  name: {{ include "miniflux.name" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- with .Values.labels }}
    {{ toYaml . }}
    {{- end }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
  selector:
    {{- with .Values.labels }}
    {{ toYaml . }}
    {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "miniflux.db.name" . }}
  namespace: {{ .Values.namespace | default "miniflux" }}
spec:
  clusterIP: None
  selector:
    {{- with .Values.db.labels }}
    {{ toYaml . }}
    {{- end }}
  ports:
    - port: 5432
      targetPort: postgres
      protocol: TCP

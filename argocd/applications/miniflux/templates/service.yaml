apiVersion: v1
kind: Service
metadata:
  name: {{ include "miniflux.name" . }}-db
  namespace: {{ .Values.namespace }}
  labels:
    {{- with .Values.labels }}
    {{ toYaml . }}
    {{- end }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: {{ include "miniflux.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: v1
kind: Service
metadata:
  name: miniflux-db
  namespace: {{ .Values.namespace | default "miniflux" }}
spec:
  clusterIP: None
  selector:
    app: miniflux
  ports:
    - port: 5432
      targetPort: postgres
      protocol: TCP

apiVersion: v1
kind: Service
metadata:
  name: {{ include "miniflux.name" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- with .Values.labels }}
    {{ toYaml . }}
    {{- end }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: {{ include "miniflux.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}

apiVersion: v1
kind: Service
metadata:
  name: {{ include "bambuddy.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "bambuddy.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    {{- include "bambuddy.selectorLabels" . | nindent 4 }}
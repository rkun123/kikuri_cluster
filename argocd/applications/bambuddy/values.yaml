nameOverride: ""
fullnameOverride: ""

namespace: bambuddy
destination:
  server: https://kubernetes.default.svc

labels:
  app: bambuddy

source:
  image: ghcr.io/maziggy/bambuddy
  # renovate: datasource=docker depName=ghcr.io/maziggy/bambuddy
  tag: "0.2.4.8"

# docker-compose.yml の構成を再現するための環境変数
env:
  TZ: Asia/Tokyo
  PUID: "1000"
  PGID: "1000"
  # 必要に応じて以下の環境変数を有効化
  # BAMBUDDY_EXTERNAL_ROOTS: ""
  # USE_SYSTEM_TRUST_STORE: "false"

# ネットワークおよび権限設定
securityContext:
  capabilities:
    add:
      - NET_BIND_SERVICE

# 永続化ボリュームの設定
pvc_data:
  storageClass:
    name: fast
  accessModes:
    - ReadWriteOnce
  storage: 2Gi

pvc_logs:
  storageClass:
    name: fast
  accessModes:
    - ReadWriteOnce
  storage: 500Mi

# bambustudioapi の設定
bambu_studio_api:
  image: ghcr.io/maziggy/bambu-studio-api
  # renovate: datasource=docker depName=ghcr.io/maziggy/bambu-studio-api
  tag: "0.2.4.8"
  port: 3000
